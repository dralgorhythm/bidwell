name: Pull Request Pipeline

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: write
  pull-requests: write
  checks: write

env:
  NODE_VERSION: '24'
  CACHE_VERSION: 'v1'

jobs:
  # Fast feedback: Auto-fix formatting and linting issues
  auto-fix:
    name: Auto-fix & Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      changes: ${{ steps.git-check.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Auto-fix code style
        run: |
          npm run lint:fix
          npm run format:fix

      - name: Check for changes
        id: git-check
        run: |
          echo "changes=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit auto-fixes
        if: steps.git-check.outputs.changes != '0'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "style: auto-fix linting and formatting issues" -m "[skip ci]"
          git push

  # Core validation pipeline - runs in parallel for speed
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: [auto-fix]
    if: always() && (needs.auto-fix.result == 'success' || needs.auto-fix.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, test, build]
        include:
          - check: typecheck
            command: npm run type-check
            description: TypeScript compilation
          - check: test
            command: npm run test:coverage
            description: Unit tests
          - check: build
            command: npm run build
            description: Production build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run ${{ matrix.description }}
        run: ${{ matrix.command }}
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload test coverage
        if: matrix.check == 'test'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  # Preview deployment for PRs
  preview:
    name: Preview Build
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build preview
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-${{ github.event.number }}
          path: out/
          retention-days: 7

      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Get build info
            const outDir = './out';
            let buildSize = 'Unknown';
            
            if (fs.existsSync(outDir)) {
              // Simple size check (recursive size would be better but this is fast)
              const stats = fs.statSync(outDir);
              buildSize = 'Calculated'; 
            }
            
            const comment = `## 🔍 Preview Build Ready
            
            **Build Status**: ✅ Success
            **Node Version**: ${{ env.NODE_VERSION }}
            
            📦 Preview artifact uploaded - check the Actions tab to download.
            
            > This preview was built from commit ${{ github.sha }}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
