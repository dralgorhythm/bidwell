name: Code Quality Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.git-check.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint with fix
        run: npm run lint:fix

      - name: Run Prettier with fix
        run: npm run format:fix

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changes=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit auto-fixes
        if: steps.git-check.outputs.changes != '0'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "style: auto-fix linting and formatting issues"
          git push

  # Core validation jobs run in parallel after lint fixes
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout with fixes
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    strategy:
      matrix:
        node-version: ['18', '20']
    steps:
      - name: Checkout with fixes
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage (Node 20 only)
        if: matrix.node-version == '20'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout with fixes
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application (static export)
        run: npm run build:static
        env:
          GITHUB_ACTIONS: true

      - name: Save build artifacts
        uses: actions/cache/save@v4
        with:
          path: |
            out
            node_modules
          key: build-${{ github.sha }}-${{ hashFiles('**/package-lock.json') }}

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout with fixes
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate

      - name: Check for vulnerabilities
        run: npx audit-ci --moderate

  # Integration tests that require a built application
  accessibility-test:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: [lint-and-format, build]
    steps:
      - name: Checkout with fixes
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            out
            node_modules
          key: build-${{ github.sha }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install axe CLI
        run: npm install -g @axe-core/cli

      - name: Install serve
        run: npm install -g serve@latest

      - name: Install compatible ChromeDriver version
        run: |
          # Get Chrome version
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' | head -1)
          CHROME_MAJOR_VERSION=$(echo $CHROME_VERSION | cut -d. -f1)
          echo "Chrome version: $CHROME_VERSION (major: $CHROME_MAJOR_VERSION)"
          
          # For Chrome 115+ use the new Chrome for Testing API, for older versions use legacy storage
          if [ "$CHROME_MAJOR_VERSION" -ge 115 ]; then
            echo "Using Chrome for Testing API for Chrome $CHROME_MAJOR_VERSION"
            # Get the latest stable ChromeDriver version for this Chrome version
            CHROMEDRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json" | jq -r '.channels.Stable.version')
            echo "ChromeDriver version: $CHROMEDRIVER_VERSION"
            
            # Download and install ChromeDriver
            curl -o /tmp/chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/$CHROMEDRIVER_VERSION/linux64/chromedriver-linux64.zip"
            sudo unzip /tmp/chromedriver.zip -d /tmp/
            sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/
            sudo chmod +x /usr/local/bin/chromedriver
          else
            echo "Using legacy ChromeDriver storage for Chrome $CHROME_MAJOR_VERSION"
            # Get compatible ChromeDriver version from legacy storage
            CHROMEDRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_MAJOR_VERSION")
            echo "ChromeDriver version: $CHROMEDRIVER_VERSION"
            
            # Download and install ChromeDriver
            curl -o /tmp/chromedriver.zip "https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip"
            sudo unzip /tmp/chromedriver.zip -d /usr/local/bin/
            sudo chmod +x /usr/local/bin/chromedriver
          fi
          
          # Verify installation
          /usr/local/bin/chromedriver --version

      - name: Start static application
        run: npx serve@latest out -l 3000 &

      - name: Wait for application
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run accessibility tests
        run: |
          axe http://localhost:3000 --chromedriver-path /usr/local/bin/chromedriver --exit
          axe http://localhost:3000/comparison --chromedriver-path /usr/local/bin/chromedriver --exit

  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [lint-and-format, build]
    steps:
      - name: Checkout with fixes
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            out
            node_modules
          key: build-${{ github.sha }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Install serve
        run: npm install -g serve@latest

      - name: Install compatible ChromeDriver version
        run: |
          # Get Chrome version
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+\.\d+' | head -1)
          CHROME_MAJOR_VERSION=$(echo $CHROME_VERSION | cut -d. -f1)
          echo "Chrome version: $CHROME_VERSION (major: $CHROME_MAJOR_VERSION)"
          
          # For Chrome 115+ use the new Chrome for Testing API, for older versions use legacy storage
          if [ "$CHROME_MAJOR_VERSION" -ge 115 ]; then
            echo "Using Chrome for Testing API for Chrome $CHROME_MAJOR_VERSION"
            # Get the latest stable ChromeDriver version for this Chrome version
            CHROMEDRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json" | jq -r '.channels.Stable.version')
            echo "ChromeDriver version: $CHROMEDRIVER_VERSION"
            
            # Download and install ChromeDriver
            curl -o /tmp/chromedriver.zip "https://storage.googleapis.com/chrome-for-testing-public/$CHROMEDRIVER_VERSION/linux64/chromedriver-linux64.zip"
            sudo unzip /tmp/chromedriver.zip -d /tmp/
            sudo mv /tmp/chromedriver-linux64/chromedriver /usr/local/bin/
            sudo chmod +x /usr/local/bin/chromedriver
          else
            echo "Using legacy ChromeDriver storage for Chrome $CHROME_MAJOR_VERSION"
            # Get compatible ChromeDriver version from legacy storage
            CHROMEDRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_$CHROME_MAJOR_VERSION")
            echo "ChromeDriver version: $CHROMEDRIVER_VERSION"
            
            # Download and install ChromeDriver
            curl -o /tmp/chromedriver.zip "https://chromedriver.storage.googleapis.com/$CHROMEDRIVER_VERSION/chromedriver_linux64.zip"
            sudo unzip /tmp/chromedriver.zip -d /usr/local/bin/
            sudo chmod +x /usr/local/bin/chromedriver
          fi
          
          # Verify installation
          /usr/local/bin/chromedriver --version

      - name: Start static application
        run: npx serve@latest out -l 3000 &

      - name: Wait for application
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse CI
        run: |
          export CHROME_PATH=$(which google-chrome)
          export LIGHTHOUSE_CHROMIUM_PATH=$CHROME_PATH
          lhci autorun --upload.target=temporary-public-storage --collect.url=http://localhost:3000
          lhci autorun --upload.target=temporary-public-storage --collect.url=http://localhost:3000/comparison
