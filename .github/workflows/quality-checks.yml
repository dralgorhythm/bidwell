name: Quality Assurance Pipeline

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: write
  pull-requests: write
  checks: write

env:
  NODE_VERSION: '20'
  CACHE_VERSION: 'v1'

jobs:
  # Fast feedback: Auto-fix formatting and linting issues
  auto-fix:
    name: Auto-fix & Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      changes: ${{ steps.git-check.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Auto-fix code style
        run: |
          npm run lint:fix
          npm run format:fix

      - name: Check for changes
        id: git-check
        run: |
          echo "changes=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit auto-fixes
        if: steps.git-check.outputs.changes != '0'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "style: auto-fix linting and formatting issues" -m "[skip ci]"
          git push

  # Core validation pipeline - runs in parallel for speed
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: [auto-fix]
    if: always() && (needs.auto-fix.result == 'success' || needs.auto-fix.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        check: [typecheck, test, build, security]
        include:
          - check: typecheck
            command: npm run type-check
            description: TypeScript compilation
          - check: test  
            command: npm run test:coverage
            description: Unit tests with coverage
          - check: build
            command: npm run build
            description: Production build
          - check: security
            command: npm audit --audit-level=moderate
            description: Security audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run ${{ matrix.description }}
        run: ${{ matrix.command }}
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload test coverage
        if: matrix.check == 'test' && github.event_name == 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Cache build artifacts
        if: matrix.check == 'build'
        uses: actions/cache/save@v4
        with:
          path: |
            out
            .next/cache
          key: build-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ github.sha }}

  # Advanced testing - only runs on main or when explicitly needed
  advanced-testing:
    name: E2E & Performance
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    strategy:
      matrix:
        test-type: [accessibility, performance]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore build artifacts
        uses: actions/cache/restore@v4
        with:
          path: |
            out
            .next/cache
          key: build-${{ env.CACHE_VERSION }}-${{ runner.os }}-${{ github.sha }}

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install testing tools
        run: |
          npm install -g @axe-core/cli serve wait-on
          if [ "${{ matrix.test-type }}" = "performance" ]; then
            npm install -g @lhci/cli@0.13.x
          fi

      - name: Start application
        run: |
          npx serve out -l 3000 &
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run accessibility tests
        if: matrix.test-type == 'accessibility'
        run: |
          axe http://localhost:3000 --exit
          axe http://localhost:3000/comparison --exit

      - name: Run performance tests
        if: matrix.test-type == 'performance'
        run: |
          export CHROME_PATH=$(which chrome)
          lhci autorun --upload.target=temporary-public-storage --collect.url=http://localhost:3000
          lhci autorun --upload.target=temporary-public-storage --collect.url=http://localhost:3000/comparison