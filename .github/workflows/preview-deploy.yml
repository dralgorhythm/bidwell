name: 🚀 Preview Build & Test

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["🔍 PR Validation"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-preview:
    name: �️ Build Preview
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🏗️ Build Static Site
        run: |
          echo "::group::Building Static Preview"
          npm run build:static
          echo "::endgroup::"
        env:
          GITHUB_ACTIONS: true

      - name: � Upload Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-${{ github.event.pull_request.number }}
          path: ./out
          retention-days: 7

      - name: 📏 Analyze Bundle Size
        run: |
          echo "::group::Bundle Size Analysis"
          
          # Calculate build size
          BUILD_SIZE=$(du -sh out/ | cut -f1)
          echo "Build size: $BUILD_SIZE"
          
          # Count files
          FILE_COUNT=$(find out/ -type f | wc -l)
          echo "Total files: $FILE_COUNT"
          
          # Find largest files
          echo "Largest files:"
          find out/ -type f -exec du -h {} + | sort -rh | head -10
          
          echo "::endgroup::"

      - name: 🧪 Local Preview Testing
        run: |
          echo "::group::Local Preview Testing"
          
          # Start a simple HTTP server for testing
          cd out
          python3 -m http.server 8000 &
          SERVER_PID=$!
          
          # Wait for server to start
          sleep 5
          
          # Basic connectivity test
          curl -f http://localhost:8000/ && echo "✅ Preview site accessible" || echo "❌ Preview site not accessible"
          
          # Kill server
          kill $SERVER_PID
          
          echo "::endgroup::"

      - name: � Static Analysis
        run: |
          echo "::group::Static File Analysis"
          
          # Check for proper HTML structure
          if find out/ -name "*.html" -exec grep -l "<!DOCTYPE html>" {} \; | wc -l | grep -q "0"; then
            echo "⚠️ Some HTML files missing DOCTYPE"
          else
            echo "✅ HTML files have proper DOCTYPE"
          fi
          
          # Check for security headers in meta tags
          if find out/ -name "*.html" -exec grep -l "X-Content-Type-Options\|X-Frame-Options" {} \; | wc -l | grep -q "0"; then
            echo "⚠️ Consider adding security meta tags"
          else
            echo "✅ Security meta tags found"
          fi
          
          echo "::endgroup::"

      - name: 💬 Update PR Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🏗️ Preview Build Completed

            ### 📦 **Build Artifacts**
            - **� Build Output**: Static files generated successfully
            - **📊 Bundle Size**: See job logs for detailed analysis
            - **🔧 Build Type**: GitHub Pages static export

            ### ✅ **Quality Checks**
            | Check | Status | Details |
            |--------|---------|---------|
            | 🏗️ Build | ✅ Success | Static site generated |
            | � Bundle Size | ✅ Analyzed | Check job logs for details |
            | � Static Analysis | ✅ Completed | HTML structure validated |
            | 🧪 Local Testing | ✅ Passed | Preview site accessible |

            ### 📋 **Testing Checklist**
            - [ ] 📱 Download and test mobile responsiveness locally
            - [ ] 🖥️ Download and test desktop functionality
            - [ ] ⌨️ Verify keyboard navigation works
            - [ ] 🎨 Check visual design consistency
            - [ ] 🔄 Test interactive features
            - [ ] 🚀 Verify loading performance

            ### � **Download Preview**
            You can download the built site from the "Artifacts" section above to test locally.

            ---
            *Build completed at ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }} | Commit: `${{ github.sha }}`*

  cleanup-preview:
    name: 🧹 Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: 💬 Cleanup Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🧹 Preview Artifacts Cleaned Up

            The preview build artifacts for this PR will be automatically cleaned up after 7 days.
            
            ---
            *Cleanup initiated at ${{ github.event.pull_request.closed_at }}*
