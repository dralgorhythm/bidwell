# Development workflow for rapid iteration and testing
# Optimized for fast feedback during development
#
name: Development Pipeline

on:
  push:
    branches-ignore: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'

jobs:
  # Ultra-fast development checks
  quick-check:
    name: Quick Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Fast validation pipeline
        run: |
          echo "🔍 Running fast development checks..."
          
          # TypeScript check (fastest)
          echo "📝 TypeScript compilation..."
          npm run type-check
          
          # Linting (quick)
          echo "🧹 Code style check..."
          npm run lint
          
          # Core tests only (skip coverage for speed)
          echo "🧪 Essential tests..."
          npm test -- --passWithNoTests --silent --maxWorkers=2
          
          # Quick build test
          echo "🏗️ Build verification..."
          npm run build
          
          echo "✅ All quick checks passed!"

      - name: Performance estimate
        run: |
          # Quick bundle size check
          if [ -d "out" ]; then
            SIZE=$(du -sh out | cut -f1)
            echo "📦 Build size: $SIZE"
            echo "Build size: $SIZE" >> $GITHUB_STEP_SUMMARY
          fi

  # Preview deployment for PRs
  preview-build:
    name: Preview Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build preview
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-${{ github.event.number }}
          path: out/
          retention-days: 7

      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Get build info
            const outDir = './out';
            let buildSize = 'Unknown';
            
            if (fs.existsSync(outDir)) {
              const stats = fs.statSync(outDir);
              buildSize = `${(stats.size / (1024 * 1024)).toFixed(2)} MB`;
            }
            
            const comment = `## 🔍 Preview Build Ready
            
            **Build Status**: ✅ Success
            **Build Size**: ${buildSize}
            **Node Version**: ${{ env.NODE_VERSION }}
            
            📦 Preview artifact uploaded - check the Actions tab to download.
            
            > This preview was built from commit ${{ github.sha }}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });